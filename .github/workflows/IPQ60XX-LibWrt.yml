name: IPQ60XX-LibWrt

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/laipeng668/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: Config/IPQ60XX.config
  GENERAL_CONFIG_FILE: Config/General.config
  DIY_SCRIPT: scripts/Roc-script.sh
  FIRMWARE_TAG: ZN-M2-NSS
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-22.04  # 建议使用 22.04 以获得更好的兼容性

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization Environment
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL ophub.org/ubuntu2204-make-openwrt-depends)
        sudo timedatectl set-timezone "$TZ"

    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true

    - name: Clone Source Code
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
        cd openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

    - name: Install Feeds
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration
      run: |
        cd $OPENWRT_PATH
        chmod +x $GITHUB_WORKSPACE/$DIY_SCRIPT
        $GITHUB_WORKSPACE/$DIY_SCRIPT

    - name: Finalize .config
      run: |
        cd $OPENWRT_PATH
        cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
        cat $GITHUB_WORKSPACE/$GENERAL_CONFIG_FILE >> .config
        # 强制锁定硬件 Target
        echo "CONFIG_TARGET_qualcommax=y" >> .config
        echo "CONFIG_TARGET_qualcommax_ipq60xx=y" >> .config
        echo "CONFIG_TARGET_DEVICE_qualcommax_ipq60xx_DEVICE_zn_m2=y" >> .config
        sed -i '/luci-app-argon-config/d' .config
        make defconfig

    - name: Compile Firmware
      id: compile
      run: |
        cd $OPENWRT_PATH
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload & Release
      if: steps.compile.outputs.status == 'success'
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.FIRMWARE_TAG }} - $(date +"%Y-%m-%d")
        tag: ${{ env.FIRMWARE_TAG }}-${{ github.run_id }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.OPENWRT_PATH }}/bin/targets/*/*/*